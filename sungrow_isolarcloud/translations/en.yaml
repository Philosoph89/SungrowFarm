configuration:
  region:
    name: Region
    description: iSolarCloud server hosting your account (Europe → eu).
  appkey:
    name: Appkey
    description: Appkey of your application from the Sungrow Developer Portal.
  secret_key:
    name: Secret key
    description: Secret / access key (x-access-key) of your application.
  username:
    name: Username
    description: Your iSolarCloud login (e-mail address).
  password:
    name: Password
    description: Your iSolarCloud password.
  rsa_public_key:
    name: RSA public key
    description: >-
      RSA public key of your application from the developer portal. Enables the
      encrypted API mode – required when requests fail with error E900
      ("Unauthorized access").
  app_id:
    name: Application ID
    description: >-
      Application ID of your app from the developer portal. Needed for the
      account authorisation (OAuth) flow if the diagnosis finds no working
      API variant.
  openweather_api_key:
    name: OpenWeather API key
    description: >-
      Free API key from openweathermap.org – enables the solar planner
      (recommendation when to run energy-intensive appliances).
  latitude:
    name: Latitude (optional)
    description: Location override for the weather forecast; defaults to the plant location.
  longitude:
    name: Longitude (optional)
    description: Location override for the weather forecast; defaults to the plant location.
  poll_interval:
    name: Poll interval
    description: Seconds between cloud polls (the cloud only updates every ~5 min).
  language:
    name: Language
    description: Language of sensor names and the UI.
  mqtt_enabled:
    name: MQTT sensors
    description: Publish all measure points as Home Assistant sensors via MQTT discovery.
  demo_mode:
    name: Demo mode
    description: Show simulated data (no credentials required).
