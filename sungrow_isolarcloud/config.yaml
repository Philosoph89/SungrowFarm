name: Sungrow iSolarCloud
version: 1.1.0
slug: sungrow_isolarcloud
description: Verbindet dein Sungrow iSolarCloud Konto mit Home Assistant – schönes Dashboard, alle Messwerte als Sensoren via MQTT.
url: https://github.com/philippmueller/sungrowfarm
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto
hassio_api: true
hassio_role: default
ingress: true
ingress_port: 8099
panel_icon: mdi:solar-power-variant
panel_title: Sungrow
services:
  - mqtt:want
options:
  region: eu
  appkey: ""
  secret_key: ""
  username: ""
  password: ""
  rsa_public_key: ""
  poll_interval: 300
  language: de
  mqtt_enabled: true
  demo_mode: false
schema:
  region: list(eu|international|china|australia)
  appkey: str
  secret_key: password
  username: str
  password: password
  rsa_public_key: str?
  poll_interval: int(60,3600)
  language: list(de|en)
  mqtt_enabled: bool
  demo_mode: bool
